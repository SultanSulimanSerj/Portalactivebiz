name: manexa

services:
  postgres:
    image: postgres:15
    container_name: project_portal_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-project_portal}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 3

  pgbouncer:
    image: edoburu/pgbouncer:1.21.0-p2
    container_name: project_portal_pgbouncer
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme_local_dev}@postgres:5432/${POSTGRES_DB:-project_portal}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
    ports:
      - "${PGBOUNCER_PORT:-6432}:5432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: project_portal_redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: project_portal_gotenberg
    environment:
      API_TIMEOUT: 120s
      LIBREOFFICE_MAX_QUEUE_SIZE: 50
    ports:
      - "${GOTENBERG_PORT:-3001}:3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  document-export-worker:
    image: node:20-bookworm-slim
    container_name: project_portal_export_worker
    working_dir: /app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme_local_dev}@postgres:5432/${POSTGRES_DB:-project_portal}
      REDIS_URL: redis://redis:6379
      GOTENBERG_URL: http://gotenberg:3000
      MINIO_ENDPOINT: http://minio:9000
      DOCUMENT_EXPORT_WORKER_CONCURRENCY: ${DOCUMENT_EXPORT_WORKER_CONCURRENCY:-3}
    command: >
      sh -c "apt-get update -y &&
      apt-get install -y openssl ca-certificates &&
      npm install &&
      npx prisma generate &&
      npx tsx scripts/document-export-worker.ts"
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      gotenberg:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: project_portal_storage
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_local_dev}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  minio_data:
  redis_data:
