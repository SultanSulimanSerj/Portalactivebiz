name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:ci@localhost:5432/manexa_ci
      NEXTAUTH_SECRET: ci-nextauth-secret-min-32-chars-long
      NEXTAUTH_URL: http://localhost:3000
      CRON_SECRET: ci-cron-secret-min-32-chars-long
      ALLOW_PUBLIC_REGISTRATION: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Smoke checks
        run: npm test

      - name: Build application
        run: npm run build

